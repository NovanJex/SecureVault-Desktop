name: "Tauri Cross-Platform Build & Publish"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'windows-latest'
          - platform: 'ubuntu-22.04'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Rust targets
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            squashfs-tools

      - name: Install node dependencies
        run: npm install

      - name: Build Tauri App and Publish to GitHub Releases
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'SecureVault v__VERSION__'
          releaseBody: '🔐 SecureVault - 纯本地离线密码管理器，桌面多系统单文件免安装版。采用 Argon2id/PBKDF2 密钥派生搭配 AES-256-GCM 加密，数据 100% 本地存储，程序绝不联网。'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload Windows portable binary
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          BIN="src-tauri/target/release/secure-vault-desktop.exe"
          ZIP="SecureVault_${{ github.ref_name }}_Windows.zip"
          7z a "$ZIP" "$BIN"
          gh release upload "${{ github.ref_name }}" "$ZIP" --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
